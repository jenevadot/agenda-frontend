services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_NAME: "Agenda Salón"
    ports:
      - "5173:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - agenda-network

  backend:
    build:
      context: ../agenda-salon-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/agenda_salon
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - JWT_CLAVE_SECRETA=dev-secret-key-change-in-production
      - JWT_ALGORITMO=HS256
      - JWT_HORAS_EXPIRACION=24
      - CORS_ORIGINS=http://localhost:5173
      - DEBUG=true
      - ENTORNO=development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agenda-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agenda_salon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agenda-network

networks:
  agenda-network:
    driver: bridge

volumes:
  postgres_data:
